services:
  converter:
    build: ./converter
    ports:
      - "41101:41101"
    depends_on:
      - api
    command: streamlit run app.py --server.port 41101 --server.address 0.0.0.0
    environment:
      - API_URL=http://api:41102
  api:
    build: ./api
    expose:
      - "41102"
    command: gunicorn -w 1 -b 0.0.0.0:41102 app:app
